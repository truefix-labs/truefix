# cargo-deny config (Constitution Principle III: clean Apache-2.0 OR MIT release).
# Run: cargo deny check
[graph]
all-features = true

[licenses]
# Allow only permissive licenses compatible with dual Apache-2.0 OR MIT distribution.
# Copyleft (GPL/LGPL/MPL/AGPL) into source is intentionally NOT listed -> denied.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 (Marvin Attack: RSA private-key timing sidechannel), no patched version
    # exists yet. Transitive via sqlx-mysql's optional `rsa` feature, used only for MySQL 8's
    # `caching_sha2_password` full-authentication handshake (client encrypts the password with the
    # server's RSA *public* key). The advisory's actual risk is leaking a *private* key through
    # decryption timing; our client-side code only performs public-key encryption and never holds
    # or uses an RSA private key, so the vulnerable code path isn't reachable here. Dropping the
    # dependency instead (disabling sqlx's `mysql-rsa` feature) breaks real, currently-exercised
    # MySQL connectivity: MySQL 8's default auth plugin requires this exchange on a fresh
    # connection without TLS, which is exactly what our own CI `sql` job's mysql:8 service
    # container test does.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2025-0134 (rustls-pemfile unmaintained) reappears transitively via `tiberius`'s own
    # `rustls` feature (US14, FR-020's MSSQL backend, behind the new off-by-default `mssql`
    # feature) — the same advisory this workspace's own direct PEM parsing already moved off of
    # (see the `fix(deps)` commit migrating to rustls-pki-types::pem). tiberius offers no way to
    # get rustls-based TLS without pulling this in; the only alternative is `native-tls`
    # (tiberius's other TLS option), which this project avoids project-wide to keep a single,
    # consistent TLS stack (rustls). Scoped to the `mssql` feature only, not the default build.
    "RUSTSEC-2025-0134",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
