# cargo-deny config (Constitution Principle III: clean Apache-2.0 OR MIT release).
# Run: cargo deny check
[graph]
all-features = true

[licenses]
# Allow only permissive licenses compatible with dual Apache-2.0 OR MIT distribution.
# Copyleft (GPL/LGPL/MPL/AGPL) into source is intentionally NOT listed -> denied.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    # CC0-1.0 (public-domain-equivalent dedication, no conditions at all) and
    # CDLA-Permissive-2.0 (an MIT-style permissive license for *data*, used by `webpki-roots`
    # for its bundled Mozilla root CA certificate data) — both pulled in transitively via
    # `mongodb` (US6, feature 004, behind the new off-by-default `mongodb` feature:
    # tiny-keccak via macro_magic/const-random; webpki-roots directly). Neither is copyleft —
    # both are strictly more permissive than even MIT/Apache-2.0 (no attribution or
    # same-license-propagation requirement), so both are compatible with this workspace's
    # Apache-2.0 OR MIT release stance (Principle III's actual concern is copyleft
    # contamination, which neither license risks).
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 (Marvin Attack: RSA private-key timing sidechannel), no patched version
    # exists yet. Transitive via sqlx-mysql's optional `rsa` feature, used only for MySQL 8's
    # `caching_sha2_password` full-authentication handshake (client encrypts the password with the
    # server's RSA *public* key). The advisory's actual risk is leaking a *private* key through
    # decryption timing; our client-side code only performs public-key encryption and never holds
    # or uses an RSA private key, so the vulnerable code path isn't reachable here. Dropping the
    # dependency instead (disabling sqlx's `mysql-rsa` feature) breaks real, currently-exercised
    # MySQL connectivity: MySQL 8's default auth plugin requires this exchange on a fresh
    # connection without TLS, which is exactly what our own CI `sql` job's mysql:8 service
    # container test does.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2025-0134 (rustls-pemfile unmaintained) reappears transitively via `tiberius`'s own
    # `rustls` feature (US14, FR-020's MSSQL backend, behind the new off-by-default `mssql`
    # feature) — the same advisory this workspace's own direct PEM parsing already moved off of
    # (see the `fix(deps)` commit migrating to rustls-pki-types::pem). tiberius offers no way to
    # get rustls-based TLS without pulling this in; the only alternative is `native-tls`
    # (tiberius's other TLS option), which this project avoids project-wide to keep a single,
    # consistent TLS stack (rustls). Scoped to the `mssql` feature only, not the default build.
    "RUSTSEC-2025-0134",
    # RUSTSEC-2026-0098 / RUSTSEC-2026-0099 / RUSTSEC-2026-0104: `rustls-webpki` 0.101.7, pulled in
    # transitively via the same `tiberius` `rustls` feature (mssql feature only) through its own
    # pinned `tokio-rustls 0.24 -> rustls 0.21 -> rustls-webpki 0.101.7` stack — one major line
    # behind this workspace's own direct rustls usage. No fix exists on the 0.101.x branch (patched
    # versions start at >=0.103.12, which needs rustls 0.23+; `tiberius` 0.12.3 — the latest
    # release on crates.io as of this writing — has no such upgrade available), and `tiberius` has
    # no rustls-based path around it (native-tls, its only alternative, is avoided project-wide to
    # keep a single, consistent TLS stack — see the RUSTSEC-2025-0134 entry above).
    #
    # All three advisories are in `rustls-webpki`'s certificate-chain/name-constraint/CRL path
    # validation (`webpki::EndEntityCert::verify_*`), which our own MSSQL usage never reaches:
    # `MssqlStore`/`MssqlLog::parse_url` always calls `tiberius::Config::trust_cert()`, which wires
    # in `tiberius`'s own `NoCertVerifier` (`src/client/tls_stream/rustls_tls_stream.rs`) via
    # rustls's `dangerous()` config API — `verify_server_cert`/`verify_tls12_signature` both return
    # an unconditional `Ok(...::assertion())` without ever calling into `rustls-webpki`. Same
    # reachability argument as the RUSTSEC-2023-0071 entry above: the vulnerable code path is
    # present in the dependency tree but never executed by this codebase's own usage.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
