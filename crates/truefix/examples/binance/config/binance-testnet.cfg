# Example configuration for the `binance` example, targeting Binance's SPOT FIX testnet.
# Docs: https://developers.binance.com/legacy-docs/binance-spot-api-docs/fix-api
#
# This is a QuickFIX-style settings file (parsed by the `truefix-config` crate): a [DEFAULT]
# section whose keys are inherited by every [SESSION] below (a session's own keys override),
# with ${name} interpolation (falls back to an environment variable of the same name if the key
# isn't set anywhere in this file -- handy for keeping secrets out of the file, as below).
#
# Run (from the repository root): see crates/truefix/examples/binance/README.md for full setup;
# in short:
#   cargo run -p truefix --example binance -- crates/truefix/examples/binance/config/binance-testnet.cfg
#
# Standard keys (Appendix A, mapped by truefix-config) are documented in QuickFIX's own
# configuration reference. TLS is NOT toggled here via SocketUseSSL -- this example always
# connects over TLS regardless (Binance requires it, and never requires a client certificate), so
# there is no SocketUseSSL/SocketKeyStore key to set.
#
# Binance-specific keys (read directly by the example, not part of Appendix A):
#   BinanceEndpoint          OrderEntry | DropCopy | MarketData        (required)
#   BinanceApiKey             Ed25519 API key (tag 553 Username)        (required)
#   BinancePrivateKeyPath    path to the Ed25519 PKCS#8 PEM private key (required)
#   BinanceMessageHandling   Unordered | Sequential                    (default: Unordered)
#   BinanceResponseMode      Everything | OnlyAcks                     (default: unset -> Everything)
#   BinanceRecvWindow        milliseconds, stamped on Logon only       (default: unset)
#   BinanceLogDb             redb file (Redb) or FileLog dir (File)    (default: log/<sender>-<endpoint>-log[.redb])
#   BinanceTrustStore        PEM CA bundle path                        (default: bundled webpki-roots)
#
# Each [SESSION] independently picks its message/event log backend (truefix's own
# NEW-156/NEW-157 async FileLog + rotation work, specs/012-audit-007-remediation/ in this repo):
#   BinanceLogBackend        Redb | File                               (default: Redb)
#
# BinanceLogBackend=Redb (default) uses truefix_log::RedbLog -- one embedded transactional
# database file, queryable with:
#   cargo run -p truefix --example binance -- --dump-log log/<sender>-<endpoint>-log.redb
#
# BinanceLogBackend=File uses truefix_log::FileLog -- plain-text messages.log/event.log in the
# BinanceLogDb directory, written through a bounded channel + background task so a slow disk
# never blocks this session's read/dispatch loop. Optional tuning (same key names truefix-config's
# own LogSpec resolution uses, so they'll look familiar from a plain truefix .cfg):
#   FileLogHeartbeats               Y | N   (default: Y)  include Heartbeat (35=0) lines
#   FileIncludeTimeStampForMessages Y | N   (default: Y)  prefix each line with a timestamp
#   FileIncludeMilliseconds         Y | N   (default: Y)  include milliseconds in that timestamp
#   MaxFileLogSize                  bytes            (default: unset -> unbounded)
#   FileLogMaxGenerations           count            (default: unset -> single `.1` backup)
#   FileLogRollIntervalSecs         seconds          (default: unset -> no time-based roll)
#
# DataDictionary= below points at crates/truefix/examples/binance/dict/binance-{oe,md}.fixdict,
# generated from Binance's own spot-fix-oe.xml/spot-fix-md.xml via
# `truefix-dict generate-dict --format vendor-xml` (regenerate the same way if Binance revises
# those files). Attaching a dictionary is what makes body-level repeating groups
# (NoOrders/NoMDEntries/NoMiscFees/...) come back structured via `FieldMap::group()`.
# ValidateIncomingMessage=N keeps the dictionary decode-only -- it does not turn on rejection of
# incoming messages that don't otherwise match the dictionary's field/required/order rules.

[DEFAULT]
BeginString=FIX.4.4
TargetCompID=SPOT
ConnectionType=initiator
HeartBtInt=30
ResetOnLogon=Y
BinanceApiKey=${BINANCE_FIX_API_KEY}
BinancePrivateKeyPath=${BINANCE_FIX_PRIVATE_KEY}

[SESSION]
# Order entry: place/cancel/amend orders, query rate limits.
BinanceEndpoint=OrderEntry
SenderCompID=${BINANCE_FIX_SENDER_COMP_ID}1
SessionQualifier=OrderEntry
SocketConnectHost=fix-oe.testnet.binance.vision
SocketConnectPort=9000
UseDataDictionary=Y
DataDictionary=crates/truefix/examples/binance/dict/binance-oe.fixdict
ValidateIncomingMessage=N

[SESSION]
# Market data: subscribe to book/trade streams, query instrument rules. Highest message volume of
# the three endpoints and the least in need of redb's transactional replay guarantees, so this
# session demonstrates the File backend instead: non-blocking writes, rolled daily, keeping the
# last 7 days -- swap back to (or just omit, since Redb is the default) BinanceLogBackend=Redb to
# compare.
BinanceEndpoint=MarketData
SenderCompID=${BINANCE_FIX_SENDER_COMP_ID}2
SessionQualifier=MarketData
SocketConnectHost=fix-md.testnet.binance.vision
SocketConnectPort=9000
UseDataDictionary=Y
DataDictionary=crates/truefix/examples/binance/dict/binance-md.fixdict
ValidateIncomingMessage=N
BinanceLogBackend=File
FileLogMaxGenerations=7
FileLogRollIntervalSecs=86400

[SESSION]
# Drop copy: read-only ExecutionReport replay across every session on the account, ~1s delayed.
BinanceEndpoint=DropCopy
SenderCompID=${BINANCE_FIX_SENDER_COMP_ID}2
SessionQualifier=DropCopy
SocketConnectHost=fix-dc.testnet.binance.vision
SocketConnectPort=9000
UseDataDictionary=Y
DataDictionary=crates/truefix/examples/binance/dict/binance-oe.fixdict
ValidateIncomingMessage=N

# Production hosts, for reference (swap into SocketConnectHost above, drop ".testnet.vision"):
#   fix-oe.binance.com / fix-dc.binance.com / fix-md.binance.com
